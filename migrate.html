<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Migrate localStorage → Firebase</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>body{font-family:system-ui;max-width:600px;margin:40px auto;padding:20px}h1{font-size:22px}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin:8px 4px}
.btn-blue{background:#2563eb;color:#fff}.btn-green{background:#059669;color:#fff}
#log{background:#111;color:#0f0;padding:16px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;min-height:200px;margin-top:16px}
</style></head><body>
<h1>Aspen Delivery Tracker — Migration Tool</h1>
<p>This tool pushes your existing localStorage data (edits, added deliveries, custom options) to Firebase.</p>
<p><strong>Open this file in the SAME browser where you've been using the tracker.</strong></p>
<button class="btn btn-blue" onclick="preview()">1. Preview Data</button>
<button class="btn btn-green" onclick="migrate()">2. Push to Firebase</button>
<div id="log">Ready. Click "Preview" first to check your data.</div>
<script>
// ⚠️ PASTE YOUR FIREBASE CONFIG HERE (same as in index.html)
const firebaseConfig={apiKey:"PASTE_YOUR_API_KEY",authDomain:"aspen-delivery-tracker.firebaseapp.com",databaseURL:"https://aspen-delivery-tracker-default-rtdb.firebaseio.com",projectId:"aspen-delivery-tracker",storageBucket:"aspen-delivery-tracker.appspot.com",messagingSenderId:"000000000000",appId:"PASTE_YOUR_APP_ID"};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const log=document.getElementById('log');

function preview(){
  let edits=JSON.parse(localStorage.getItem('aspen_edits')||'{}');
  let added=JSON.parse(localStorage.getItem('aspen_added')||'[]');
  let opts=JSON.parse(localStorage.getItem('aspen_custom_opts')||'{}');
  log.textContent='=== EDITS ('+Object.keys(edits).length+' records modified) ===\n';
  Object.keys(edits).forEach(k=>log.textContent+='  ID '+k+': '+Object.keys(edits[k]).join(', ')+'\n');
  log.textContent+='\n=== ADDED ('+added.length+' new deliveries) ===\n';
  added.forEach(r=>log.textContent+='  '+r.n+' (ID: '+r.i+')\n');
  log.textContent+='\n=== CUSTOM OPTIONS ===\n'+JSON.stringify(opts,null,2);
  log.textContent+='\n\nReady to migrate. Click "Push to Firebase" when ready.';
}

async function migrate(){
  let edits=JSON.parse(localStorage.getItem('aspen_edits')||'{}');
  let added=JSON.parse(localStorage.getItem('aspen_added')||'[]');
  let opts=JSON.parse(localStorage.getItem('aspen_custom_opts')||'{}');
  log.textContent='Pushing to Firebase...\n';
  try{
    await db.ref('edits').set(edits);
    log.textContent+='✅ Edits pushed ('+Object.keys(edits).length+' records)\n';
    await db.ref('added').set(added);
    log.textContent+='✅ Added deliveries pushed ('+added.length+' records)\n';
    await db.ref('custom_opts').set(opts);
    log.textContent+='✅ Custom options pushed\n';
    log.textContent+='\n🎉 Migration complete! Your data is now in Firebase.\n';
    log.textContent+='You can now use the online version of the tracker.';
  }catch(e){
    log.textContent+='❌ Error: '+e.message+'\n';
    log.textContent+='Make sure your Firebase config is correct and database rules allow writes.';
  }
}
</script></body></html>
