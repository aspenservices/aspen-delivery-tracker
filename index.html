<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aspen Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1d4ed8">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231d4ed8' rx='20' width='100' height='100'/><text x='50' y='68' font-size='55' font-weight='800' fill='white' text-anchor='middle'>A</text></svg>">
<title>Aspen Spas — Delivery Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f3f4f6;color:#1f2937;font-size:15px;-webkit-text-size-adjust:100%;-webkit-overflow-scrolling:touch}
.header{background:#fff;border-bottom:2px solid #e5e7eb;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:800}
.logo h1{font-size:21px;font-weight:800;color:#111827}
.logo p{font-size:12px;color:#6b7280;font-weight:500}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border-radius:8px;border:2px solid #e5e7eb;cursor:pointer;font-size:13px;font-weight:700;background:#fff;color:#6b7280;transition:all .15s}
.tab-btn.act{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.add-btn{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:#059669;color:#fff}
.add-btn:hover{background:#047857}
/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:16px 24px}
.kpi{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s;position:relative}
.kpi:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(37,99,235,.1)}
.kpi.selected{border-color:#2563eb;box-shadow:0 2px 12px rgba(37,99,235,.15)}
.kpi-l{font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kpi-v{font-size:24px;font-weight:800}.kpi-v.sm{font-size:17px}
.kpi-hint{font-size:10px;color:#9ca3af;margin-top:4px}
/* Drilldown panel */
.drill{padding:0 24px 16px;display:none}
.drill.open{display:block}
.drill-box{background:#fff;border:2px solid #2563eb;border-radius:14px;overflow:hidden;max-height:420px;overflow-y:auto}
.drill-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#eff6ff;border-bottom:2px solid #dbeafe;position:sticky;top:0;z-index:2}
.drill-head h3{font-size:15px;font-weight:800;color:#1e40af}
.drill-close{background:#dbeafe;border:none;color:#1e40af;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:700}
.drill-close:hover{background:#bfdbfe}
.drill-row{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s;gap:12px}
.drill-row:hover{background:#eff6ff}
.drill-row:last-child{border-bottom:none}
.dr-name{font-size:14px;font-weight:700;color:#111827;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dr-spa{font-size:12px;color:#6b7280;min-width:100px}
.dr-date{font-size:12px;color:#6b7280;min-width:90px}
.dr-price{font-size:13px;font-weight:700;color:#7c3aed;min-width:90px;text-align:right}
.dr-bal{font-size:13px;font-weight:700;color:#dc2626;min-width:80px;text-align:right}
.dr-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:12px;text-transform:uppercase;min-width:70px;text-align:center}
.dr-badge.complete{background:#dcfce7;color:#059669}.dr-badge.delivered{background:#dbeafe;color:#2563eb}.dr-badge.overdue{background:#fef2f2;color:#dc2626}.dr-badge.upcoming{background:#fef9c3;color:#92400e}.dr-badge.action{background:#fff7ed;color:#c2410c}
.drill-summary{padding:10px 18px;background:#f9fafb;border-top:2px solid #e5e7eb;font-size:13px;color:#6b7280;font-weight:600;position:sticky;bottom:0}

.filters{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;padding:9px 14px;border-radius:9px;border:2px solid #e5e7eb;background:#fff;color:#1f2937;font-size:14px;outline:none;width:100%}
.search:focus{border-color:#2563eb}
.fbtn{padding:7px 14px;border-radius:8px;border:2px solid #e5e7eb;background:#fff;color:#6b7280;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.fbtn.a-all{background:#374151;color:#fff;border-color:#374151}
.fbtn.a-complete{background:#dcfce7;color:#059669;border-color:#059669}
.fbtn.a-delivered{background:#dbeafe;color:#2563eb;border-color:#2563eb}
.fbtn.a-overdue{background:#fef2f2;color:#dc2626;border-color:#dc2626}
.fbtn.a-upcoming{background:#fef9c3;color:#92400e;border-color:#d97706}
.fbtn.a-action{background:#fff7ed;color:#c2410c;border-color:#ea580c}
.board{padding:0 24px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.card{background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:16px;cursor:pointer;transition:all .15s}
.card:hover{border-color:#93c5fd;box-shadow:0 3px 10px rgba(37,99,235,.08)}
.sbar{height:4px;border-radius:2px;margin-bottom:12px}
.sbar.complete{background:#059669}.sbar.delivered{background:#2563eb}.sbar.overdue{background:#dc2626}.sbar.upcoming{background:#d97706}.sbar.action{background:#ea580c}
.c-name{font-size:15px;font-weight:700;color:#111827}
.c-spa{font-size:12px;color:#6b7280;margin-top:1px}
.badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.badge.complete{background:#dcfce7;color:#059669}.badge.delivered{background:#dbeafe;color:#2563eb}.badge.overdue{background:#fef2f2;color:#dc2626}.badge.upcoming{background:#fef9c3;color:#92400e}.badge.action{background:#fff7ed;color:#c2410c}
.c-meta{display:flex;gap:12px;font-size:12px;color:#6b7280;margin:10px 0;flex-wrap:wrap;font-weight:500}
.c-meta .bal{color:#dc2626;font-weight:700}
.pl{font-size:10px;color:#6b7280;margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.pbar{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.ptrk{flex:1;height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.pfil{height:100%;border-radius:4px}
.pcnt{font-size:12px;color:#6b7280;min-width:36px;text-align:right;font-weight:700}
.c-note{margin-top:8px;font-size:12px;color:#4b5563;background:#f9fafb;border-radius:8px;padding:7px 10px;border-left:3px solid #d97706;line-height:1.4}
.twrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 10px;text-align:left;color:#6b7280;font-weight:800;font-size:10px;text-transform:uppercase;border-bottom:3px solid #e5e7eb;background:#f9fafb;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#2563eb;background:#eff6ff}
th .srt{font-size:9px;margin-left:3px;opacity:.4}
th.act-sort{color:#1d4ed8}
th.act-sort .srt{opacity:1}
td{padding:9px 10px;border-bottom:1px solid #e5e7eb}
tbody tr:hover td{background:#eff6ff}
tbody tr{cursor:pointer}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
.charts{padding:0 24px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.cbox{background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:18px}
.cbox h3{margin:0 0 12px;font-size:14px;font-weight:800;color:#374151}
.br{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bl-l{font-size:12px;color:#6b7280;min-width:58px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt{flex:1;height:18px;background:#f3f4f6;border-radius:5px;overflow:hidden}
.bf{height:100%;border-radius:5px}
.bv{font-size:12px;color:#374151;min-width:22px;text-align:right;font-weight:800}
/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:999;padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mdl{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:88vh;overflow:auto;padding:24px;-webkit-overflow-scrolling:touch}
.mdl h2{font-size:19px;font-weight:800;color:#111827}
.mdl .sub{font-size:13px;color:#6b7280;margin-top:3px}
.xbtn{background:#f3f4f6;border:2px solid #e5e7eb;color:#6b7280;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.xbtn:hover{background:#e5e7eb}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ib{background:#f9fafb;border:1px solid #e5e7eb;border-radius:9px;padding:9px 12px}
.ib label{font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;display:block;margin-bottom:2px}
.ib span{font-size:14px;color:#1f2937;font-weight:600;word-break:break-all}
.ib input,.ib select,.ib textarea{width:100%;padding:6px 8px;border:2px solid #e5e7eb;border-radius:6px;font-size:14px;font-family:inherit;color:#1f2937;background:#fff;outline:none}
.ib input:focus,.ib select:focus,.ib textarea:focus{border-color:#2563eb}
.ib textarea{resize:vertical;min-height:50px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.ai{display:flex;justify-content:space-between;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;padding:7px 10px}
.ai label{font-size:11px;color:#6b7280;font-weight:700}
.ai span{font-size:12px;color:#1f2937;font-weight:600}
.ai select{padding:4px 6px;border:2px solid #e5e7eb;border-radius:5px;font-size:12px;background:#fff;color:#1f2937;outline:none;max-width:160px}
.cs{margin-bottom:16px}
.ct{font-size:13px;font-weight:800;color:#374151;margin-bottom:8px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ci{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:5px 4px;border-radius:6px;cursor:pointer;user-select:none;transition:background .1s;-webkit-tap-highlight-color:transparent}
.ci:hover{background:#f3f4f6}
.ci:active{background:#e5e7eb}
.ci.on{color:#059669}.ci.off{color:#c9cdd4}
.cd{width:16px;height:16px;border-radius:50%;flex-shrink:0;transition:all .15s;cursor:pointer;min-width:16px;min-height:16px}
.cd.on{background:#059669;border:2px solid #047857}.cd.off{background:#fff;border:2px solid #d1d5db}
.nb{background:#f9fafb;border:1px solid #e5e7eb;border-radius:9px;padding:9px 12px;margin-bottom:8px;border-left:3px solid #2563eb}
.nb label{font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;display:block;margin-bottom:3px}
.nb p{font-size:13px;color:#374151;line-height:1.5}
.nb textarea{width:100%;padding:6px 8px;border:2px solid #e5e7eb;border-radius:6px;font-size:13px;font-family:inherit;color:#1f2937;outline:none;resize:vertical;min-height:44px}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:2px solid #e5e7eb}
.mbtn{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.mbtn-c{background:#f3f4f6;color:#6b7280;border:2px solid #e5e7eb}
.mbtn-s{background:#059669;color:#fff}.mbtn-s:hover{background:#047857}
.mbtn-e{background:#2563eb;color:#fff}.mbtn-e:hover{background:#1d4ed8}
.mbtn-complete{background:#059669;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;gap:6px}
.mbtn-complete:hover{background:#047857}
.mbtn-complete.disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.mbtn-complete.disabled:hover{background:#d1d5db}
.nbtn-save{background:#2563eb;color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px}
.nbtn-save:hover{background:#1d4ed8}
.tv-section{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:16px}
.tv-section h4{font-size:13px;font-weight:800;color:#166534;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tv-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.tv-row .ib{flex:1;min-width:140px}
.tv-dl{background:#059669;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tv-dl:hover{background:#047857}
.tv-dl.disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.hidden{display:none}
.empty{grid-column:1/-1;text-align:center;padding:50px;color:#6b7280;font-size:15px}
/* Mobile: 700px and below */
@media(max-width:700px){
body{font-size:14px}
.header{padding:12px 14px;gap:8px}
.logo-icon{width:34px;height:34px;font-size:17px}
.logo h1{font-size:17px}
.hdr-actions{width:100%;justify-content:space-between}
.add-btn{flex:1;text-align:center;padding:10px 12px;font-size:14px}
.tab-btn{padding:10px 14px;font-size:13px}
.kpis{grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px}
.kpi{padding:10px 12px}
.kpi-v{font-size:20px}.kpi-v.sm{font-size:15px}
.kpi-hint{display:none}
.filters{padding:0 14px 10px;gap:6px}
.search{min-width:100%;font-size:16px;padding:10px 12px}
.fbtn{padding:8px 12px;font-size:11px}
.board{grid-template-columns:1fr;padding:0 14px 14px;gap:10px}
.card{padding:14px}
.c-name{font-size:14px}
.c-meta{font-size:11px}
.twrap{padding:0 14px 14px}
table{font-size:12px}
th,td{padding:7px 6px}
.charts{padding:0 14px 14px;grid-template-columns:1fr}
.drill{padding:0 14px 12px}
.drill-box{max-height:60vh}
.drill-head{padding:10px 14px}
.drill-row{flex-wrap:wrap;gap:4px;padding:10px 14px}
.dr-spa,.dr-date,.dr-price,.dr-bal{min-width:auto;font-size:11px}
.dr-name{font-size:13px;white-space:normal}
.drill-summary{padding:8px 14px;font-size:12px}
/* Modal full-screen on mobile */
.ov{padding:0;align-items:flex-end}
.mdl{max-width:100%;max-height:95vh;border-radius:16px 16px 0 0;padding:18px 16px;padding-bottom:env(safe-area-inset-bottom,20px)}
.mdl h2{font-size:17px}
.ig{grid-template-columns:1fr;gap:8px}
.ag{grid-template-columns:1fr;gap:6px}
.cg{grid-template-columns:repeat(3,1fr);gap:4px}
.ci{font-size:12px;padding:6px 2px;gap:4px}
.cd{width:20px;height:20px}
.ai{padding:8px 10px}
.ai select{font-size:13px;max-width:140px}
.ib input,.ib select,.ib textarea{font-size:16px;padding:8px 10px}
.nb textarea{font-size:16px;padding:8px 10px}
.mbtn{padding:12px 20px;font-size:14px}
.mbtn-complete{padding:10px 16px;font-size:13px;width:100%}
.tv-section{padding:12px}
.tv-dl{font-size:13px;padding:10px 14px}
.nbtn-save{padding:8px 16px;font-size:13px}
.mactions{flex-direction:column}
.mactions .mbtn{width:100%;text-align:center}
}
/* Extra small phones */
@media(max-width:380px){
.kpis{grid-template-columns:1fr 1fr;gap:6px;padding:10px}
.kpi-v{font-size:18px}
.cg{grid-template-columns:repeat(2,1fr)}
.board{padding:0 10px 10px}
.header{padding:10px}
.filters{padding:0 10px 8px}
}
#loading-ov{position:fixed;inset:0;background:#f3f4f6;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
#loading-ov.hide{opacity:0;pointer-events:none}
.ld-spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top:4px solid #2563eb;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{margin-top:14px;font-size:15px;font-weight:700;color:#6b7280;font-family:'Segoe UI',system-ui,sans-serif}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.on{background:#059669}.sync-dot.off{background:#dc2626}
</style>
</head>

let EDITS={},ADDED=[];
let fbReady=false;
function AD(){let d=BASE.map(r=>{let e=EDITS[r.i];return e?Object.assign({},r,e):r});return d.concat(ADDED)}

function saveA(){dbAdded.set(ADDED).then(()=>syncPulse()).catch(e=>console.error('saveA:',e))}

function syncPulse(){let d=document.getElementById('syncDot');d.className='sync-dot on';d.title='Synced';clearTimeout(d._t);d._t=setTimeout(()=>{d.title='Connected'},1500)}

// Firebase real-time listeners
let _loadCount=0;
function checkReady(){_loadCount++;if(_loadCount>=3){fbReady=true;renderAll();
let lo=document.getElementById('loading-ov');lo.classList.add('hide');setTimeout(()=>lo.remove(),400);
document.getElementById('syncDot').className='sync-dot on';document.getElementById('syncDot').title='Connected'}}

dbEdits.on('value',snap=>{EDITS=snap.val()||{};if(fbReady)renderAll();else checkReady()});
dbAdded.on('value',snap=>{ADDED=snap.val()||[];if(!Array.isArray(ADDED))ADDED=Object.values(ADDED);if(fbReady)renderAll();else checkReady()});
dbOpts.on('value',snap=>{let c=snap.val()||{};
if(c.tb)c.tb.forEach(v=>{if(!OPT_TB.includes(v))OPT_TB.push(v)});
if(c.ss)c.ss.forEach(v=>{if(!OPT_SS.includes(v))OPT_SS.push(v)});
if(c.lf)c.lf.forEach(v=>{if(!OPT_LF.includes(v))OPT_LF.push(v)});
if(c.cv)c.cv.forEach(v=>{if(!OPT_CV.includes(v))OPT_CV.push(v)});
if(c.su)c.su.forEach(v=>{if(!OPT_SU.includes(v))OPT_SU.push(v)});
if(fbReady)renderAll();else checkReady()});

let search="",statusF="all",tab="board",drillType=null,sortCol="date",sortDir="desc";
function fmt(n){return n?"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"$0.00"}

// Robust date parser for all formats
function parseDate(dd){if(!dd)return null;let s=String(dd).trim();
let iso=/^(\d{4})-(\d{1,2})-(\d{1,2})/.exec(s);
if(iso)return new Date(+iso[1],+iso[2]-1,+iso[3]);
let clean=s.replace(/\s*(am|pm|all\s*day|all)\s*/gi,'').trim();
let mdy4=/^(\d{1,2})\/(\d{1,2})\/(\d{4})/.exec(clean);
if(mdy4)return new Date(+mdy4[3],+mdy4[1]-1,+mdy4[2]);
let mdy2=/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/.exec(clean);
if(mdy2){let yr=+mdy2[3];yr=yr<50?2000+yr:1900+yr;return new Date(yr,+mdy2[1]-1,+mdy2[2])}
let md=/^(\d{1,2})\/(\d{1,2})$/.exec(clean);
if(md){let m=+md[1],d=+md[2],yr=m>=10?2025:2026;return new Date(yr,m-1,d)}
return null}
function fmtDate(dd){let d=parseDate(dd);if(!d||isNaN(d))return dd||'TBD';
return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dateNote(dd){if(!dd)return'';let m=String(dd).match(/(am|pm|all\s*day)/i);return m?' '+m[0]:''}

function st(r){if(r.co)return"complete";if(r.dl)return"delivered";let d=parseDate(r.dd);if(d&&!isNaN(d)&&d<=new Date()){if(r.pf)return"action";return"overdue"}return"upcoming"}
function sL(s){return{complete:"Complete",delivered:"Delivered",overdue:"Past Due",upcoming:"Upcoming",action:"Needs Action"}[s]}
function sC(s){return{complete:"#059669",delivered:"#2563eb",overdue:"#dc2626",upcoming:"#d97706",action:"#ea580c"}[s]}
function fil(){let list=AD().filter(r=>{if(!r.n)return 0;let s=st(r);if(statusF!=="all"&&s!==statusF)return 0;if(search){let q=search.toLowerCase();return[r.n,r.sp,r.st,r.ph,String(r.sn||""),r.em].some(v=>(v||"").toLowerCase().includes(q))}return 1});
// Sort
list.sort((a,b)=>{let v=0;
if(sortCol==="date"){let da=parseDate(a.dd),db=parseDate(b.dd);da=da&&!isNaN(da)?da.getTime():0;db=db&&!isNaN(db)?db.getTime():0;v=da-db}
else if(sortCol==="name"){v=(a.n||"").localeCompare(b.n||"")}
else if(sortCol==="price"){v=(a.pr||0)-(b.pr||0)}
else if(sortCol==="balance"){v=(a.bl||0)-(b.bl||0)}
else if(sortCol==="status"){let o={overdue:0,action:1,upcoming:2,delivered:3,complete:4};v=(o[st(a)]||0)-(o[st(b)]||0)}
return sortDir==="desc"?-v:v});
return list}
function pH(items,r){let d=items.filter(c=>r[c.k]).length,p=items.length?(d/items.length)*100:0,col=p===100?"#059669":p>50?"#2563eb":"#d97706";
return'<div class="pbar"><div class="ptrk"><div class="pfil" style="width:'+p+'%;background:'+col+'"></div></div><span class="pcnt">'+d+'/'+items.length+'</span></div>'}
function opt(arr,sel){return'<option value="">—</option>'+arr.map(v=>'<option'+(v===sel?' selected':'')+'>'+v+'</option>').join('')}

// === KPI DRILLDOWN ===
function renderKPIs(){let a=AD().filter(r=>r.n),co=a.filter(r=>st(r)==="complete").length,dl=a.filter(r=>st(r)==="delivered").length,up=a.filter(r=>st(r)==="upcoming").length,od=a.filter(r=>st(r)==="overdue").length,ac=a.filter(r=>st(r)==="action").length,rv=a.reduce((s,r)=>s+(r.pr||0),0),bl=a.reduce((s,r)=>s+(r.bl||0),0);
document.getElementById("kpis").innerHTML=[
["total","Total",a.length,"#1f2937",0],["complete","Complete",co,"#059669",0],["delivered","Delivered",dl,"#2563eb",0],["upcoming","Upcoming",up,"#d97706",0],["action","Needs Action",ac,"#ea580c",0],["overdue","Past Due",od,"#dc2626",0],["revenue","Revenue",fmt(rv),"#7c3aed",1],["balance","Balance",fmt(bl),"#dc2626",1]
].map(([t,l,v,c,s])=>'<div class="kpi'+(drillType===t?" selected":"")+'" onclick="toggleDrill(\''+t+'\')"><div class="kpi-l">'+l+'</div><div class="kpi-v'+(s?" sm":"")+'" style="color:'+c+'">'+v+'</div><div class="kpi-hint">Click for details</div></div>').join("")}

function toggleDrill(type){
if(drillType===type){drillType=null;document.getElementById("drill").classList.remove("open");renderKPIs();return}
drillType=type;renderKPIs();renderDrill()}

function renderDrill(){
let a=AD().filter(r=>r.n),list=[];
let title="",color="#2563eb";
if(drillType==="total"){list=a;title="All Deliveries ("+a.length+")";color="#374151"}
else if(drillType==="complete"){list=a.filter(r=>st(r)==="complete");title="Completed ("+list.length+")";color="#059669"}
else if(drillType==="delivered"){list=a.filter(r=>st(r)==="delivered");title="Delivered — Not Complete ("+list.length+")";color="#2563eb"}
else if(drillType==="upcoming"){list=a.filter(r=>st(r)==="upcoming");title="Upcoming ("+list.length+")";color="#d97706"}
else if(drillType==="overdue"){list=a.filter(r=>st(r)==="overdue");title="Past Due ("+list.length+")";color="#dc2626"}
else if(drillType==="action"){list=a.filter(r=>st(r)==="action");title="Needs Action — Paid but Pending ("+list.length+")";color="#ea580c"}
else if(drillType==="revenue"){list=a.filter(r=>r.pr>0).sort((a,b)=>b.pr-a.pr);title="Revenue Breakdown ("+list.length+" customers)";color="#7c3aed"}
else if(drillType==="balance"){list=a.filter(r=>r.bl>0).sort((a,b)=>b.bl-a.bl);title="Outstanding Balances ("+list.length+" customers)";color="#dc2626"}

// Sort by date desc for status types
if(["total","complete","delivered","upcoming","overdue","action"].includes(drillType)){
list.sort((a,b)=>{let da=parseDate(a.dd),db=parseDate(b.dd);da=da&&!isNaN(da)?da.getTime():0;db=db&&!isNaN(db)?db.getTime():0;return db-da})}

let totalRev=list.reduce((s,r)=>s+(r.pr||0),0);
let totalBal=list.reduce((s,r)=>s+(r.bl||0),0);

let h='<div class="drill-head"><h3 style="color:'+color+'">'+title+'</h3><button class="drill-close" onclick="toggleDrill(\''+drillType+'\')">&times;</button></div>';
list.forEach(r=>{let s=st(r);
h+='<div class="drill-row" onclick="openDet('+r.i+')"><div class="dr-badge '+s+'">'+sL(s)+'</div><div class="dr-name">'+r.n+'</div><div class="dr-spa">'+(r.sp||"—")+'</div><div class="dr-date">'+fmtDate(r.dd)+dateNote(r.dd)+'</div><div class="dr-price">'+(r.pr>0?fmt(r.pr):"—")+'</div>'+(drillType==="balance"||r.bl>0?'<div class="dr-bal">'+fmt(r.bl)+'</div>':'')+'</div>'});
if(!list.length)h+='<div style="padding:30px;text-align:center;color:#9ca3af">No records found.</div>';
h+='<div class="drill-summary">Total: '+list.length+' deliveries &bull; Revenue: '+fmt(totalRev)+(totalBal>0?' &bull; <span style="color:#dc2626">Balance Due: '+fmt(totalBal)+'</span>':'')+'</div>';
document.getElementById("drillBox").innerHTML=h;
document.getElementById("drill").classList.add("open")}

function renderFilters(){document.getElementById("filterBtns").innerHTML=["all","upcoming","action","delivered","overdue","complete"].map(s=>'<button class="fbtn'+(statusF===s?" a-"+s:"")+'" onclick="statusF=\''+s+'\';render()">'+( s==="all"?"All":sL(s))+'</button>').join("")}
function toggleSort(col){if(sortCol===col){sortDir=sortDir==="desc"?"asc":"desc"}else{sortCol=col;sortDir="desc"}render()}
function renderBoard(){let h="";fil().forEach(r=>{let s=st(r);h+='<div class="card" onclick="openDet('+r.i+')"><div class="sbar '+s+'"></div><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div class="c-name">'+r.n+'</div><div class="c-spa">'+(r.sp||"—")+(r.sn?" &bull; SN "+r.sn:"")+'</div></div><span class="badge '+s+'">'+sL(s)+'</span></div><div class="c-meta"><span>&#128197; '+fmtDate(r.dd)+dateNote(r.dd)+'</span>'+(r.pr>0?'<span>&#128176; '+fmt(r.pr)+'</span>':'')+(r.bl>0?'<span class="bal">&#9888; '+fmt(r.bl)+'</span>':'')+'</div><div><div class="pl">Pre-Delivery</div>'+pH(PRE,r)+'</div><div><div class="pl">Post-Delivery</div>'+pH(POST,r)+'</div>'+(r.en?'<div class="c-note">'+r.en.substring(0,90)+(r.en.length>90?"...":"")+'</div>':'')+'</div>'});
if(!fil().length)h='<div class="empty">No deliveries match.</div>';document.getElementById("board").innerHTML=h}
function thH(label,col){let active=sortCol===col;let arrow=active?(sortDir==="desc"?"▼":"▲"):"⇅";return'<th class="'+(active?"act-sort":"")+'" onclick="toggleSort(\''+col+'\')">'+label+' <span class="srt">'+arrow+'</span></th>'}
function renderTable(){document.getElementById("th").innerHTML="<tr>"+thH("Status","status")+thH("Customer","name")+thH("Spa","name")+thH("Date","date")+thH("Price","price")+thH("Balance","balance")+"<th>Pre</th><th>Post</th><th>Cover</th><th>Lift</th></tr>";
let h="";fil().forEach(r=>{let s=st(r);h+='<tr onclick="openDet('+r.i+')"><td><span class="dot" style="background:'+sC(s)+'"></span><span style="color:'+sC(s)+';font-weight:700">'+sL(s)+'</span></td><td style="font-weight:700;color:#111827;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.n+'</td><td style="color:#6b7280">'+(r.sp||"—")+'</td><td style="color:#6b7280;white-space:nowrap">'+fmtDate(r.dd)+dateNote(r.dd)+'</td><td style="color:#7c3aed;font-weight:700">'+(r.pr>0?fmt(r.pr):"—")+'</td><td style="color:'+(r.bl>0?"#dc2626":"#9ca3af")+';font-weight:'+(r.bl>0?700:400)+'">'+(r.bl>0?fmt(r.bl):"—")+'</td><td style="width:100px">'+pH(PRE,r)+'</td><td style="width:100px">'+pH(POST,r)+'</td><td style="color:#6b7280;font-size:12px">'+(r.cv||"—")+'</td><td style="color:#6b7280;font-size:12px">'+(r.lf||"—")+'</td></tr>'});
document.getElementById("tb").innerHTML=h}
function renderCharts(){let mo={},md={};AD().filter(r=>r.dd&&r.n).forEach(r=>{let d=parseDate(r.dd);if(!d||isNaN(d))return;let k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");mo[k]=(mo[k]||0)+1});
AD().filter(r=>r.sp&&r.n).forEach(r=>{let b=r.sp.split(",")[0].trim();md[b]=(md[b]||0)+1});
let ma=Object.entries(mo).sort((a,b)=>a[0].localeCompare(b[0])),mx=Math.max(...ma.map(m=>m[1]),1);

document.getElementById("charts").innerHTML='<div class="cbox"><h3>Monthly Deliveries</h3>'+ma.map(([k,v])=>'<div class="br"><span class="bl-l">'+k+'</span><div class="bt"><div class="bf" style="width:'+(v/mx*100)+'%;background:linear-gradient(90deg,#2563eb,#1d4ed8)"></div></div><span class="bv">'+v+'</span></div>').join("")+'</div><div class="cbox"><h3>Top Spa Models</h3>'+sa.map(([m,c])=>'<div class="br"><span class="bl-l" style="min-width:75px">'+m+'</span><div class="bt"><div class="bf" style="width:'+(c/sx*100)+'%;background:linear-gradient(90deg,#059669,#10b981)"></div></div><span class="bv">'+c+'</span></div>').join("")+'</div>'}

function ib(l,id,val){return'<div class="ib"><label>'+l+'</label><input id="'+id+'" value="'+String(val||"").replace(/"/g,'&quot;')+'"></div>'}
function ai(l,id,opts,val,optKey){return'<div class="ai"><label>'+l+'</label><div style="display:flex;gap:4px;align-items:center"><select id="'+id+'">'+opt(opts,val)+'</select><button style="background:#2563eb;color:#fff;border:none;width:24px;height:24px;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center" onclick="addOpt(\''+id+'\',\''+optKey+'\')" title="Add new option">+</button></div></div>'}

function addOpt(selectId,optKey){
let v=prompt('Enter new option:');if(!v||!v.trim())return;v=v.trim();
let map={tb:OPT_TB,ss:OPT_SS,lf:OPT_LF,cv:OPT_CV,su:OPT_SU};
let arr=map[optKey];if(!arr)return;
if(!arr.includes(v))arr.push(v);
// Save custom options to Firebase
saveOpts();
// Update select and set value
let sel=document.getElementById(selectId);
let o=document.createElement('option');o.value=v;o.textContent=v;o.selected=true;sel.appendChild(o)}

function toggleCk(id,key,el){
let addIdx=ADDED.findIndex(r=>r.i===id);
if(addIdx>=0){ADDED[addIdx][key]=!ADDED[addIdx][key];saveA()}
else{if(!EDITS[id])EDITS[id]={};let cur=AD().find(r=>r.i===id);EDITS[id][key]=!cur[key];saveE()}
curRec=AD().find(r=>r.i===id);
let dot=el.querySelector(".cd"),on=curRec[key];
dot.className="cd "+(on?"on":"off");el.className="ci "+(on?"on":"off");
renderKPIs();if(drillType)renderDrill()}

return{n:document.getElementById("e_n").value.trim(),dd:document.getElementById("e_dd").value.trim()||null,
sp:sB?(sS?sB+", "+sS:sB):null,sn:document.getElementById("e_sn").value.trim()||null,
ph:document.getElementById("e_ph").value.trim()||null,em:document.getElementById("e_em").value.trim()||null,
st:document.getElementById("e_st").value.trim()||null,pr:pr,py:py,bl:Math.round((pr-py)*100)/100,
tb:document.getElementById("e_tb").value||null,ss:document.getElementById("e_ss").value||null,
lf:document.getElementById("e_lf").value||null,cv:document.getElementById("e_cv").value||null,
su:document.getElementById("e_su").value||null,
cn:document.getElementById("e_cn").value.trim()||null,en:document.getElementById("e_en").value.trim()||null,
dn:document.getElementById("e_dn").value.trim()||null,fn:document.getElementById("e_fn").value.trim()||null,
tvd:(document.getElementById("tv_date")?document.getElementById("tv_date").value:null)||null,
tvt:(document.getElementById("tv_time")?document.getElementById("tv_time").value:null)||'09:00',
tvn:(document.getElementById("tv_notes")?document.getElementById("tv_notes").value.trim():null)||null}}

function saveEdit(){let id=curRec.i,u=gatherEdits();
let ai=ADDED.findIndex(x=>x.i===id);
if(ai>=0){Object.assign(ADDED[ai],u);saveA()}else{if(!EDITS[id])EDITS[id]={};Object.assign(EDITS[id],u);saveE()}
curRec=AD().find(x=>x.i===id);renderModal();renderAll()}

curRec={i:Date.now(),n:"",sp:null,sn:null,dd:null,st:null,ph:null,em:null,cn:null,pr:0,py:0,bl:0,ck:false,
pf:false,iv:false,ca:false,el:false,wp:false,lv:false,pt:false,ch:false,rc:false,
tb:null,ss:null,lf:null,cv:null,su:null,en:null,dn:null,fn:null,

function saveNew(){

let u=gatherEdits();Object.assign(curRec,u);

function setTab(t){tab=t;document.getElementById("tbBoard").classList.toggle("act",t==="board");document.getElementById("tbTable").classList.toggle("act",t==="table");
document.getElementById("board").classList.toggle("hidden",t!=="board");document.getElementById("tw").classList.toggle("hidden",t!=="table");render()}

function completeTicket(id){
let rec=AD().find(x=>x.i===id);
if(!rec||!rec.cl){alert('Cannot complete: the Call checkbox must be checked (green) first.');return}
if(!confirm('Mark "'+rec.n+'" as COMPLETE?'))return;
let ai=ADDED.findIndex(x=>x.i===id);
if(ai>=0){ADDED[ai].co=true;saveA()}else{if(!EDITS[id])EDITS[id]={};EDITS[id].co=true;saveE()}
curRec=AD().find(x=>x.i===id);renderModal();renderAll()}

function saveInlineNote(id,key,elId){
let val=document.getElementById(elId).value.trim()||null;
let ai=ADDED.findIndex(x=>x.i===id);
if(ai>=0){ADDED[ai][key]=val;saveA()}else{if(!EDITS[id])EDITS[id]={};EDITS[id][key]=val;saveE()}
curRec=AD().find(x=>x.i===id);
let btn=document.getElementById(elId).nextElementSibling;btn.textContent='Saved ✓';btn.style.background='#059669';setTimeout(()=>{btn.textContent='Save';btn.style.background=''},1500)}

function saveTechVisit(id){
let tvd=document.getElementById('tv_date').value||null;
let tvt=document.getElementById('tv_time').value||'09:00';
let tvn=document.getElementById('tv_notes').value.trim()||null;
let ai=ADDED.findIndex(x=>x.i===id);
if(ai>=0){Object.assign(ADDED[ai],{tvd,tvt,tvn});saveA()}else{if(!EDITS[id])EDITS[id]={};Object.assign(EDITS[id],{tvd,tvt,tvn});saveE()}
curRec=AD().find(x=>x.i===id);renderModal()}

function downloadICS(id){
let r=AD().find(x=>x.i===id);if(!r||!r.tvd)return;
let d=r.tvd.replace(/-/g,''),t=(r.tvt||'09:00').replace(':',''),endH=parseInt((r.tvt||'09:00').split(':')[0])+1;
let eT=String(endH).padStart(2,'0')+(r.tvt||'09:00').split(':')[1];
let loc=(r.st||'').replace(/\n/g,', ');
let lines=['Aspen Spas — Technical Visit'];
lines.push('Customer: '+r.n);
if(r.sp)lines.push('Spa: '+r.sp);
if(r.sn)lines.push('SN: '+r.sn);
if(r.ph)lines.push('Phone: '+r.ph);
if(r.em)lines.push('Email: '+r.em);
if(r.st)lines.push('Address: '+(r.st||'').replace(/\n/g,', '));
if(r.dd)lines.push('Delivery Date: '+r.dd);
let acc=[];
if(r.tb&&r.tb!=='NO')acc.push('Table: '+r.tb);
if(r.ss&&r.ss!=='NONE')acc.push('Steps: '+r.ss);
if(r.lf&&r.lf!=='NONE')acc.push('Lift: '+r.lf);
if(r.cv)acc.push('Cover: '+r.cv);
if(r.su)acc.push('Start Up: '+r.su);
if(acc.length)lines.push('Accessories: '+acc.join(' | '));
if(r.tvn)lines.push('Tech Notes: '+r.tvn);
if(r.dn)lines.push('Delivered Notes: '+r.dn);
if(r.fn)lines.push('Customer Feedback: '+r.fn);
let desc=lines.join('\\n');
let ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Aspen Spas//Delivery Tracker//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',
'BEGIN:VEVENT','DTSTART:'+d+'T'+t+'00','DTEND:'+d+'T'+eT.replace(':','')+'00',
'SUMMARY:Tech Visit — '+r.n+(r.sp?' ('+r.sp+')':''),'DESCRIPTION:'+desc,'LOCATION:'+loc,
'STATUS:CONFIRMED','BEGIN:VALARM','TRIGGER:-PT30M','ACTION:DISPLAY','DESCRIPTION:Tech visit in 30 minutes','END:VALARM',
'END:VEVENT','END:VCALENDAR'].join('\r\n');
let blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
let a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='TechVisit_'+r.n.replace(/[^a-zA-Z0-9]/g,'_')+'.ics';a.click();URL.revokeObjectURL(a.href)}


function render(){renderFilters();renderBoard();renderTable()}
function renderAll(){if(!fbReady)return;renderKPIs();render();renderCharts();if(drillType)renderDrill()}
// Initial render is triggered by Firebase listeners via checkReady()
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeOv()});
</script>
